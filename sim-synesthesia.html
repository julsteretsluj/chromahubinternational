<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    (function () {
      const s = localStorage.getItem("chroma-theme");
      const p = window.matchMedia("(prefers-color-scheme: light)").matches;
      document.documentElement.setAttribute("data-theme", s || (p ? "light" : "dark"));
      const safeOn = localStorage.getItem("chroma-seizure-safe") === "true";
      if (safeOn) document.documentElement.setAttribute("data-seizure-safe", "true");
      window.chromaSeizureSafe = function () {
        return document.documentElement.getAttribute("data-seizure-safe") === "true";
      };
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synesthesia Experience — ChromaSim</title>
  <link rel="icon" type="image/png" href="emblem.png">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="nav-container">
      <a href="index.html" class="logo">
        <img src="emblem.png" alt="" class="logo-img logo-dark" width="44" height="44">
        <img src="chinobg.PNG" alt="" class="logo-img logo-light" width="44" height="44">
        <span class="logo-text">Chroma Hub International</span>
      </a>
      <nav class="site-nav"><ul><li><a href="chroma-sim.html" class="active">Back to ChromaSim</a></li></ul></nav>
    </div>
  </header>
  <main id="main">
    <header class="page-header pillar-digital">
      <div class="container">
        <h1>Synesthesia: Cross-Wired Sensorium</h1>
        <p>Typing creates color blooms and tone shifts to model cross-modal sensory feedback.</p>
        <div class="project-cta"><a href="chroma-sim.html" class="btn btn-secondary">← Back to ChromaSim</a></div>
      </div>
    </header>
    <section class="section">
      <div class="container">
        <div class="experience-shell">
          <div class="experience-controls">
            <input id="synInput" class="xp-input" placeholder="Type here to generate color + sound">
            <span id="synState" class="xp-badge">Idle</span>
          </div>
          <canvas id="synCanvas" class="syn-canvas" width="900" height="240"></canvas>
          <p class="muted-note" id="synNote">Each key maps to a hue and oscillator frequency.</p>
        </div>
      </div>
    </section>
  </main>
  <script src="js/sim-common.js"></script>
  <script>
    const c = document.getElementById("synCanvas");
    const ctx2 = c.getContext("2d");
    const input = document.getElementById("synInput");
    const state = document.getElementById("synState");
    const note = document.getElementById("synNote");
    const ac = new (window.AudioContext || window.webkitAudioContext)();

    function isSafe() {
      return window.chromaSeizureSafe?.();
    }

    function clearCanvas() {
      ctx2.fillStyle = "#050509";
      ctx2.fillRect(0, 0, c.width, c.height);
    }

    function bloom(char, x, y) {
      if (isSafe()) return;
      const code = char.charCodeAt(0) || 60;
      const px = x ?? Math.random() * c.width;
      const py = y ?? Math.random() * c.height;
      const hue = (code * 7) % 360;
      ctx2.fillStyle = `hsla(${hue},90%,60%,0.25)`;
      ctx2.beginPath();
      ctx2.arc(px, py, 25 + Math.random() * 40, 0, Math.PI * 2);
      ctx2.fill();
      const o = ac.createOscillator();
      const g = ac.createGain();
      const f = ac.createBiquadFilter();
      o.frequency.value = 180 + (code % 60) * 8;
      o.type = "sine";
      f.type = "lowpass";
      f.frequency.value = 600 + code * 10;
      g.gain.value = 0.03;
      o.connect(f).connect(g).connect(ac.destination);
      o.start();
      o.stop(ac.currentTime + 0.12);
      state.textContent = `Hue ${hue} • ${o.frequency.value.toFixed(0)}Hz`;
    }

    function updateSynNote() {
      note.textContent = isSafe()
        ? "Epilepsy safe mode is on — blooms and tones are disabled."
        : "Each key maps to a hue and oscillator frequency.";
      state.textContent = isSafe() ? "Safe mode: blooms off" : "Idle";
    }

    clearCanvas();
    input.addEventListener("keydown", async (e) => {
      if (isSafe()) return;
      if (ac.state !== "running") await ac.resume();
      bloom(e.key);
    });
    c.addEventListener("mousemove", (e) => {
      if (isSafe()) return;
      const r = c.getBoundingClientRect();
      const x = e.clientX - r.left;
      const y = e.clientY - r.top;
      ctx2.fillStyle = "rgba(5,5,9,0.04)";
      ctx2.fillRect(0, 0, c.width, c.height);
      bloom(String.fromCharCode(65 + Math.floor((x / c.width) * 26)), x, y);
    });

    document.addEventListener("chroma-seizure-safe-change", () => {
      clearCanvas();
      updateSynNote();
    });

    updateSynNote();
  </script>
</body>
</html>
