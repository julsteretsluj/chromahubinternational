<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><script>(function(){const s=localStorage.getItem("chroma-theme");const p=window.matchMedia("(prefers-color-scheme: light)").matches;document.documentElement.setAttribute("data-theme",s||(p?"light":"dark"));})();</script><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Dysgraphia Experience — ChromaSim</title><link rel="icon" type="image/png" href="emblem.png"><link rel="stylesheet" href="css/styles.css"></head>
<body><header class="site-header"><div class="nav-container"><a href="index.html" class="logo"><img src="emblem.png" alt="" class="logo-img logo-dark" width="44" height="44"><img src="chinobg.PNG" alt="" class="logo-img logo-light" width="44" height="44"><span class="logo-text">Chroma Hub International</span></a><nav class="site-nav"><ul><li><a href="chroma-sim.html" class="active">Back to ChromaSim</a></li></ul></nav></div></header>
<main id="main"><header class="page-header pillar-digital"><div class="container"><h1>Dysgraphia: Beyond the Keyboard</h1><p>Capture thoughts as nodes and voice snippets instead of forcing linear typing.</p></div></header>
<section class="section"><div class="container"><div class="experience-shell">
  <div class="experience-controls"><button id="addNode" class="btn btn-primary">Add Thought Node</button><button id="voiceBtn" class="btn btn-secondary">Speech to Text</button><button id="clearNodes" class="btn btn-secondary">Clear Map</button></div>
  <div class="experience-grid">
    <div class="experience-panel node-canvas" id="canvas">
      <svg class="flow-svg" id="flowSvg"></svg>
      <p class="muted-note">Drag nodes to reorganize thought clusters.</p>
    </div>
    <div class="experience-panel"><h3>Semantic Smoothing Output</h3><textarea id="out" style="width:100%;min-height:210px;background:var(--bg-elevated);color:var(--text-primary);border:1px solid var(--border);border-radius:12px;padding:0.75rem;"></textarea><p class="muted-note">Filler words are lightly cleaned while preserving intent.</p></div>
  </div></div></div></section></main>
<script>
const canvas=document.getElementById("canvas"),out=document.getElementById("out"),svg=document.getElementById("flowSvg");let i=0,dragNode=null,offX=0,offY=0;
const links=[];
function drawLinks(){svg.innerHTML="";links.forEach(([a,b])=>{if(!a.isConnected||!b.isConnected)return;const ar=a.getBoundingClientRect(),br=b.getBoundingClientRect(),cr=canvas.getBoundingClientRect();const x1=ar.left-cr.left+ar.width/2,y1=ar.top-cr.top+ar.height/2,x2=br.left-cr.left+br.width/2,y2=br.top-cr.top+br.height/2;const line=document.createElementNS("http://www.w3.org/2000/svg","line");line.setAttribute("x1",x1);line.setAttribute("y1",y1);line.setAttribute("x2",x2);line.setAttribute("y2",y2);line.setAttribute("stroke","currentColor");line.setAttribute("stroke-opacity","0.35");line.setAttribute("stroke-width","1.5");svg.appendChild(line);});}
function makeNode(label){const n=document.createElement("div");n.className="mind-node";n.textContent=label;n.style.left=Math.random()*70+"%";n.style.top=Math.random()*70+"%";n.addEventListener("pointerdown",(e)=>{dragNode=n;offX=e.offsetX;offY=e.offsetY;n.setPointerCapture(e.pointerId);});canvas.appendChild(n);return n;}
document.getElementById("addNode").onclick=()=>{const node=makeNode(`Idea ${++i}`);const nodes=[...canvas.querySelectorAll(".mind-node")];if(nodes.length>1)links.push([nodes[nodes.length-2],node]);drawLinks();};
canvas.addEventListener("pointermove",(e)=>{if(!dragNode)return;const r=canvas.getBoundingClientRect();dragNode.style.left=Math.max(0,Math.min(r.width-80,e.clientX-r.left-offX))+"px";dragNode.style.top=Math.max(0,Math.min(r.height-30,e.clientY-r.top-offY))+"px";drawLinks();});
canvas.addEventListener("pointerup",()=>{dragNode=null;});
document.getElementById("clearNodes").onclick=()=>{[...canvas.querySelectorAll(".mind-node")].forEach(n=>n.remove());links.length=0;drawLinks();i=0;};
document.getElementById("voiceBtn").onclick=()=>{const demo="um I think like inclusive tools should let people map ideas before writing final text so each thought can stand on its own before sequencing";out.value=demo.replace(/\b(um|like|you know)\b/gi,"").replace(/\s+/g," ").trim();};
["Context","Barrier","Support","Next Step"].forEach((t)=>{const n=makeNode(t);if(i>0)links.push([[...canvas.querySelectorAll(".mind-node")][i-1],n]);i++;});drawLinks();
</script></body></html>
