<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><script>(function(){const s=localStorage.getItem("chroma-theme");const p=window.matchMedia("(prefers-color-scheme: light)").matches;document.documentElement.setAttribute("data-theme",s||(p?"light":"dark"));})();</script><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Dyscalculia Experience — ChromaSim</title><link rel="icon" type="image/png" href="emblem.png"><link rel="stylesheet" href="css/styles.css"></head>
<body><header class="site-header"><div class="nav-container"><a href="index.html" class="logo"><img src="emblem.png" alt="" class="logo-img logo-dark" width="44" height="44"><img src="chinobg.PNG" alt="" class="logo-img logo-light" width="44" height="44"><span class="logo-text">Chroma Hub International</span></a><nav class="site-nav"><ul><li><a href="chroma-sim.html" class="active">Back to ChromaSim</a></li></ul></nav></div></header>
<main id="main"><header class="page-header pillar-digital"><div class="container"><h1>Dyscalculia: Visualizing Magnitude</h1><p>No raw numbers shown. Use shape, color, and pitch to interpret amount.</p></div></header>
<section class="section"><div class="container"><div class="experience-shell">
  <div class="experience-controls"><label for="mag" class="muted-note">Adjust Magnitude</label><input id="mag" type="range" min="0" max="100" value="25" style="flex:1;"></div>
  <div class="experience-grid">
    <div class="experience-panel"><h3>Spatial Meter</h3><div class="bar-meter"><div id="fill" class="bar-meter-fill"></div></div><div id="blocks" style="display:grid;grid-template-columns:repeat(10,1fr);gap:4px;margin-top:12px;"></div></div>
    <div class="experience-panel"><h3>Audio Magnitude</h3><p id="audioState">Slide to hear rising or falling pitch.</p><p class="muted-note">Pitch maps to amount instead of numeric labels.</p></div>
  </div></div></div></section></main>
<script>
const r=document.getElementById("mag"),fill=document.getElementById("fill"),blocks=document.getElementById("blocks"),ctx=new (window.AudioContext||window.webkitAudioContext)();const osc=ctx.createOscillator();osc.type="sine";osc.frequency.value=220;osc.connect(ctx.destination);osc.start();osc.disconnect();
for(let i=0;i<40;i++){const b=document.createElement("div");b.style.height="18px";b.style.borderRadius="4px";b.style.background="var(--bg-elevated)";blocks.appendChild(b);}
function draw(v){fill.style.width=v+"%";[...blocks.children].forEach((b,idx)=>{b.style.background=(idx<(v/2.5))?"linear-gradient(90deg,var(--chroma-green),var(--chroma-blue))":"var(--bg-elevated)";});osc.frequency.value=160+v*5;}
r.addEventListener("input",async e=>{if(ctx.state!=="running")await ctx.resume();osc.connect(ctx.destination);draw(+e.target.value);});draw(25);
</script></body></html>
